name: Test Docker Image

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.0
        env:
          MARIADB_ROOT_PASSWORD: root_password
          MARIADB_DATABASE: automx2
          MARIADB_USER: automx2
          MARIADB_PASSWORD: automx2_password
        options: >-
          --health-cmd="mariadb-admin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: automx2:test
          cache-from: type=gha

      - name: Test container startup
        run: |
          docker run -d \
            --name automx2-test \
            --network host \
            -e MYSQL_HOST=127.0.0.1 \
            -e MYSQL_PORT=3306 \
            -e MYSQL_USER=automx2 \
            -e MYSQL_PASSWORD=automx2_password \
            -e MYSQL_DATABASE=automx2 \
            automx2:test
          
          echo "Container started, waiting for initialization..."
          sleep 20
          
          # Check if container is running
          if ! docker ps | grep automx2-test; then
            echo "Container failed to start!"
            docker logs automx2-test
            exit 1
          fi
          
          echo "Container is running"
          docker logs automx2-test

      - name: Wait for application to be ready
        run: |
          for i in {1..40}; do
            if curl -s http://127.0.0.1:4243/ > /dev/null 2>&1; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Waiting for application... ($i/40)"
            sleep 2
          done
          echo "Application failed to respond"
          docker logs automx2-test
          exit 1

      - name: Initialize database through app
        run: |
          curl -f http://127.0.0.1:4243/initdb/

      - name: Test autoconfig endpoint
        run: |
          curl -f 'http://127.0.0.1:4243/mail/config-v1.1.xml?emailaddress=user@example.com'

      - name: Cleanup
        if: always()
        run: docker stop automx2-test || true
